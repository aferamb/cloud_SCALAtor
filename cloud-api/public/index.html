<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>cloud_SCALAtor Results</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #607080;
        --line: #d9dee5;
        --accent: #0f6cbd;
        --accent-dark: #0a4f8a;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      header,
      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 20px;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-end;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 28px;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .filters {
        display: grid;
        grid-template-columns:
          minmax(160px, 1fr)
          minmax(120px, 160px)
          minmax(110px, 140px)
          minmax(120px, 160px)
          auto;
        gap: 12px;
        align-items: end;
        padding: 16px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        color: var(--muted);
      }

      input,
      select,
      button {
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        font: inherit;
      }

      input,
      select {
        padding: 0 10px;
        background: #fff;
      }

      button {
        padding: 0 14px;
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-dark);
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(320px, 0.9fr) minmax(0, 1.4fr);
        gap: 16px;
        align-items: start;
        margin-top: 16px;
      }

      .workspace.no-items {
        grid-template-columns: 1fr;
      }

      .workspace.no-items .items-panel {
        display: none;
      }

      .items-panel,
      .table-wrap,
      .detail {
        margin-top: 16px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }

      .workspace .items-panel,
      .workspace .table-wrap {
        margin-top: 0;
      }

      .items-panel {
        padding: 16px;
      }

      .items-panel h2 {
        margin: 0 0 6px;
        font-size: 18px;
      }

      .items-summary {
        margin-bottom: 12px;
      }

      .items-table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #eef2f6;
        font-size: 12px;
        text-transform: uppercase;
        color: #3b4a5a;
      }

      tr[data-id] {
        cursor: pointer;
      }

      tr[data-id]:hover {
        background: #f2f7fc;
      }

      tr[data-id].selected {
        background: #e6f2ff;
      }

      .detail {
        padding: 16px;
      }

      .detail h2 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      pre {
        max-height: 320px;
        overflow: auto;
        padding: 12px;
        background: #101820;
        color: #f3f8ff;
        border-radius: 6px;
      }

      .error {
        margin-top: 16px;
        color: var(--danger);
      }

      .hidden {
        display: none;
      }

      @media (max-width: 760px) {
        header {
          display: block;
        }

        .filters {
          grid-template-columns: 1fr;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .runs-panel th:nth-child(5),
        .runs-panel td:nth-child(5) {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>cloud_SCALAtor</h1>
        <p>Resultados enviados desde Scala, ordenados por fecha.</p>
      </div>
    </header>

    <main>
      <section class="filters" aria-label="Filtros">
        <label>
          Usuario
          <input id="userFilter" type="search" placeholder="Buscar usuario">
        </label>
        <label>
          Fase
          <select id="phaseFilter">
            <option value="">Todas</option>
            <option value="PHASE_01">Fase 01</option>
            <option value="PHASE_02">Fase 02</option>
            <option value="PHASE_03">Fase 03</option>
            <option value="PHASE_04">Fase 04</option>
          </select>
        </label>
        <label>
          Ejecuciones
          <select id="resultsLimit">
            <option value="25">25</option>
            <option value="50">50</option>
            <option value="100" selected>100</option>
            <option value="250">250</option>
            <option value="500">500</option>
          </select>
        </label>
        <label>
          Items detalle
          <select id="detailLimit">
            <option value="25" selected>25</option>
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="250">250</option>
            <option value="500">500</option>
          </select>
        </label>
        <button id="refreshButton" type="button">Actualizar</button>
      </section>

      <p id="errorBox" class="error hidden"></p>

      <section id="workspace" class="workspace no-items">
        <section id="itemsPanel" class="items-panel" aria-label="Items de la ejecución">
          <h2>Items de la ejecución</h2>
          <p id="itemsSummary" class="items-summary"></p>
          <div class="items-table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Vuelo</th>
                  <th>Matrícula</th>
                  <th>Tipo</th>
                  <th>Minutos</th>
                  <th>Texto</th>
                </tr>
              </thead>
              <tbody id="itemsBody">
                <tr>
                  <td colspan="6">Selecciona una ejecución de Fase 01 o Fase 02</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="table-wrap runs-panel" aria-label="Tabla de resultados">
          <table>
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Usuario</th>
                <th>Fase</th>
                <th>Resumen</th>
                <th>Items</th>
              </tr>
            </thead>
            <tbody id="resultsBody">
              <tr>
                <td colspan="5">Cargando...</td>
              </tr>
            </tbody>
          </table>
        </section>
      </section>

      <section id="detailPanel" class="detail hidden" aria-label="Detalle">
        <h2 id="detailTitle">Detalle</h2>
        <div id="detailMeta"></div>
        <pre id="detailItems"></pre>
      </section>
    </main>

    <script>
      const resultsBody = document.getElementById('resultsBody');
      const errorBox = document.getElementById('errorBox');
      const workspace = document.getElementById('workspace');
      const itemsBody = document.getElementById('itemsBody');
      const itemsSummary = document.getElementById('itemsSummary');
      const detailPanel = document.getElementById('detailPanel');
      const detailTitle = document.getElementById('detailTitle');
      const detailMeta = document.getElementById('detailMeta');
      const detailItems = document.getElementById('detailItems');
      let selectedResultId = null;

      function showError(message) {
        errorBox.textContent = message;
        errorBox.classList.remove('hidden');
      }

      function clearError() {
        errorBox.textContent = '';
        errorBox.classList.add('hidden');
      }

      function formatDate(value) {
        return value ? new Date(value).toLocaleString() : '';
      }

      function text(value) {
        return value === null || value === undefined ? '' : String(value);
      }

      function hideItemsPanel() {
        workspace.classList.add('no-items');
        itemsSummary.textContent = '';
        itemsBody.innerHTML = '<tr><td colspan="6">Selecciona una ejecución de Fase 01 o Fase 02</td></tr>';
      }

      function isDelayPhase(result) {
        return result && (result.phaseCode === 'PHASE_01' || result.phaseCode === 'PHASE_02');
      }

      function renderDelayItems(result, items, itemsShown, itemsTotal) {
        workspace.classList.remove('no-items');
        itemsSummary.textContent = `${result.phaseName}: mostrando ${itemsShown} de ${itemsTotal} items`;
        if (items.length === 0) {
          itemsBody.innerHTML = '<tr><td colspan="6">No hay items para esta ejecución</td></tr>';
          return;
        }
        itemsBody.innerHTML = items.map((item) => `
          <tr>
            <td>${text(item.itemIndex)}</td>
            <td>${text(item.flightId)}</td>
            <td>${text(item.tailNum)}</td>
            <td>${text(item.delayKind)}</td>
            <td>${text(item.delayMinutes)}</td>
            <td>${text(item.rawText)}</td>
          </tr>
        `).join('');
      }

      function markSelectedRow(id) {
        resultsBody.querySelectorAll('tr[data-id]').forEach((row) => {
          row.classList.toggle('selected', row.dataset.id === String(id));
        });
      }

      async function loadResults() {
        clearError();
        detailPanel.classList.add('hidden');
        hideItemsPanel();
        selectedResultId = null;
        const params = new URLSearchParams({
          limit: document.getElementById('resultsLimit').value
        });
        const user = document.getElementById('userFilter').value.trim();
        const phase = document.getElementById('phaseFilter').value;
        if (user) params.set('user', user);
        if (phase) params.set('phase', phase);

        try {
          const response = await fetch(`/api/results?${params.toString()}`);
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error || 'No se pudieron cargar los resultados');
          }
          renderRows(payload.results || []);
        } catch (error) {
          resultsBody.innerHTML = '<tr><td colspan="5">Sin datos disponibles</td></tr>';
          showError(error.message);
        }
      }

      function renderRows(rows) {
        if (rows.length === 0) {
          resultsBody.innerHTML = '<tr><td colspan="5">No hay resultados</td></tr>';
          return;
        }
        resultsBody.innerHTML = rows.map((row) => `
          <tr data-id="${row.id}">
            <td>${formatDate(row.executedAt)}</td>
            <td>${text(row.userName)}</td>
            <td>${text(row.phaseName)}</td>
            <td>${text(row.resultSummary)}</td>
            <td>${text(row.itemCount)}</td>
          </tr>
        `).join('');
      }

      async function loadDetail(id) {
        clearError();
        selectedResultId = id;
        const itemLimit = document.getElementById('detailLimit').value;
        try {
          const response = await fetch(`/api/results/${id}?itemLimit=${encodeURIComponent(itemLimit)}`);
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error || 'No se pudo cargar el detalle');
          }
          const result = payload.result;
          const items = payload.items || [];
          const itemsShown = payload.itemsShown === undefined ? items.length : payload.itemsShown;
          const itemsTotal = payload.itemsTotal === undefined ? result.itemCount : payload.itemsTotal;
          detailTitle.textContent = `${result.phaseName} - ${result.userName}`;
          detailMeta.innerHTML = `
            <p><strong>Fecha:</strong> ${formatDate(result.executedAt)}</p>
            <p><strong>Resumen:</strong> ${text(result.resultSummary)}</p>
            <p><strong>Dataset:</strong> ${text(result.datasetPath)}</p>
            <p><strong>Items mostrados:</strong> ${text(itemsShown)} de ${text(itemsTotal)}</p>
          `;
          detailItems.textContent = JSON.stringify(items, null, 2);
          detailPanel.classList.remove('hidden');
          markSelectedRow(id);
          if (isDelayPhase(result)) {
            renderDelayItems(result, items, itemsShown, itemsTotal);
          } else {
            hideItemsPanel();
          }
        } catch (error) {
          showError(error.message);
        }
      }

      document.getElementById('refreshButton').addEventListener('click', loadResults);
      document.getElementById('resultsLimit').addEventListener('change', loadResults);
      document.getElementById('detailLimit').addEventListener('change', () => {
        if (selectedResultId) {
          loadDetail(selectedResultId);
        }
      });
      resultsBody.addEventListener('click', (event) => {
        const row = event.target.closest('tr[data-id]');
        if (row) {
          loadDetail(row.dataset.id);
        }
      });

      loadResults();
    </script>
  </body>
</html>
