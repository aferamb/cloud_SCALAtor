<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>cloud_SCALAtor Results</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #607080;
        --line: #d9dee5;
        --accent: #0f6cbd;
        --accent-dark: #0a4f8a;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      header,
      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 20px;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-end;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 28px;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .filters {
        display: grid;
        grid-template-columns:
          minmax(160px, 1fr)
          minmax(120px, 160px)
          minmax(110px, 140px)
          minmax(120px, 160px)
          auto;
        gap: 12px;
        align-items: end;
        padding: 16px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        color: var(--muted);
      }

      input,
      select,
      button {
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        font: inherit;
      }

      input,
      select {
        padding: 0 10px;
        background: #fff;
      }

      button {
        padding: 0 14px;
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-dark);
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(320px, 0.9fr) minmax(0, 1.4fr);
        gap: 16px;
        align-items: start;
        margin-top: 16px;
      }

      .workspace.no-items {
        grid-template-columns: 1fr;
      }

      .workspace.no-items .items-panel {
        display: none;
      }

      .items-panel,
      .table-wrap,
      .detail {
        margin-top: 16px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }

      .workspace .items-panel,
      .workspace .table-wrap {
        margin-top: 0;
      }

      .items-panel {
        padding: 16px;
      }

      .items-panel h2 {
        margin: 0 0 6px;
        font-size: 18px;
      }

      .items-summary {
        margin-bottom: 12px;
      }

      .items-table-wrap {
        overflow-x: auto;
      }

      .histogram-count {
        text-align: right;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .histogram-bar {
        width: 100%;
        min-width: 160px;
        height: 18px;
        overflow: hidden;
        background: #e8edf3;
        border: 1px solid var(--line);
        border-radius: 4px;
      }

      .histogram-fill {
        display: block;
        height: 100%;
        background: var(--accent);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #eef2f6;
        font-size: 12px;
        text-transform: uppercase;
        color: #3b4a5a;
      }

      tr[data-id] {
        cursor: pointer;
      }

      tr[data-id]:hover {
        background: #f2f7fc;
      }

      tr[data-id].selected {
        background: #e6f2ff;
      }

      .detail {
        padding: 16px;
      }

      .detail h2 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      pre {
        max-height: 320px;
        overflow: auto;
        padding: 12px;
        background: #101820;
        color: #f3f8ff;
        border-radius: 6px;
      }

      .error {
        margin-top: 16px;
        color: var(--danger);
      }

      .hidden {
        display: none;
      }

      @media (max-width: 760px) {
        header {
          display: block;
        }

        .filters {
          grid-template-columns: 1fr;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .runs-panel th:nth-child(5),
        .runs-panel td:nth-child(5) {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>cloud_SCALAtor</h1>
        <p>Resultados enviados desde Scala, ordenados por fecha.</p>
      </div>
    </header>

    <main>
      <section class="filters" aria-label="Filtros">
        <label>
          Usuario
          <input id="userFilter" type="search" placeholder="Buscar usuario">
        </label>
        <label>
          Fase
          <select id="phaseFilter">
            <option value="">Todas</option>
            <option value="PHASE_01">Fase 01</option>
            <option value="PHASE_02">Fase 02</option>
            <option value="PHASE_03">Fase 03</option>
            <option value="PHASE_04">Fase 04</option>
          </select>
        </label>
        <label>
          Ejecuciones
          <select id="resultsLimit">
            <option value="25">25</option>
            <option value="50">50</option>
            <option value="100" selected>100</option>
            <option value="250">250</option>
            <option value="500">500</option>
          </select>
        </label>
        <label>
          Items detalle
          <select id="detailLimit">
            <option value="25" selected>25</option>
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="250">250</option>
            <option value="500">500</option>
          </select>
        </label>
        <button id="refreshButton" type="button">Actualizar</button>
      </section>

      <p id="errorBox" class="error hidden"></p>

      <section id="workspace" class="workspace no-items">
        <section id="itemsPanel" class="items-panel" aria-label="Items de la ejecución">
          <h2 id="itemsTitle">Items de la ejecución</h2>
          <p id="itemsSummary" class="items-summary"></p>
          <div class="items-table-wrap">
            <table>
              <thead>
                <tr id="itemsHeader">
                  <th>#</th>
                  <th>Vuelo</th>
                  <th>Matrícula</th>
                  <th>Tipo</th>
                  <th>Minutos</th>
                  <th>Texto</th>
                </tr>
              </thead>
              <tbody id="itemsBody">
                <tr>
                  <td colspan="6">Selecciona una ejecución de Fase 01 o Fase 02</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="table-wrap runs-panel" aria-label="Tabla de resultados">
          <table>
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Usuario</th>
                <th>Fase</th>
                <th>Resumen</th>
                <th>Items</th>
              </tr>
            </thead>
            <tbody id="resultsBody">
              <tr>
                <td colspan="5">Cargando...</td>
              </tr>
            </tbody>
          </table>
        </section>
      </section>

      <section id="detailPanel" class="detail hidden" aria-label="Detalle">
        <h2 id="detailTitle">Detalle</h2>
        <div id="detailMeta"></div>
        <pre id="detailItems"></pre>
      </section>
    </main>

    <script>
      // Referencias a los nodos principales del visor. Se guardan una vez para
      // no repetir busquedas en el DOM cada vez que se refrescan resultados.
      const resultsBody = document.getElementById('resultsBody');
      const errorBox = document.getElementById('errorBox');
      const workspace = document.getElementById('workspace');
      const itemsTitle = document.getElementById('itemsTitle');
      const itemsHeader = document.getElementById('itemsHeader');
      const itemsBody = document.getElementById('itemsBody');
      const itemsSummary = document.getElementById('itemsSummary');
      const detailPanel = document.getElementById('detailPanel');
      const detailTitle = document.getElementById('detailTitle');
      const detailMeta = document.getElementById('detailMeta');
      const detailItems = document.getElementById('detailItems');

      // ID del run seleccionado. Permite recargar el detalle actual cuando el
      // usuario cambia el selector "Items detalle".
      let selectedResultId = null;

      // Muestra un error recuperable de carga o API sin romper el resto del
      // visor. El texto queda en un parrafo visible bajo los filtros.
      function showError(message) {
        errorBox.textContent = message;
        errorBox.classList.remove('hidden');
      }

      // Limpia el mensaje de error antes de una nueva consulta.
      function clearError() {
        errorBox.textContent = '';
        errorBox.classList.add('hidden');
      }

      // Convierte fechas ISO recibidas desde SQL/API al formato local del
      // navegador. Si el valor falta, se muestra texto vacio.
      function formatDate(value) {
        return value ? new Date(value).toLocaleString() : '';
      }

      // Normaliza valores nulos o indefinidos antes de pintarlos.
      function text(value) {
        return value === null || value === undefined ? '' : String(value);
      }

      // Escapa texto antes de insertarlo con innerHTML. El visor recibe datos
      // que originalmente vienen de Scala/SQL, asi que no debe tratarlos como
      // HTML confiable.
      function html(value) {
        return text(value).replace(/[&<>"']/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        }[char]));
      }

      // Convierte contadores del histograma a numero. Los valores invalidos se
      // tratan como cero para no romper el calculo de barras.
      function numberValue(value) {
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : 0;
      }

      // Cabecera usada cuando el panel izquierdo muestra items de retrasos
      // procedentes de Fase 01 o Fase 02.
      function delayHeader() {
        return `
          <th>#</th>
          <th>Vuelo</th>
          <th>Matrícula</th>
          <th>Tipo</th>
          <th>Minutos</th>
          <th>Texto</th>
        `;
      }

      // Cabecera usada cuando el panel izquierdo muestra el histograma de Fase 04.
      function histogramHeader() {
        return `
          <th>Aeropuerto</th>
          <th>ID</th>
          <th>Vuelos</th>
          <th>Barra</th>
        `;
      }

      // Oculta el panel izquierdo. Se usa al recargar la lista, cuando no hay run
      // seleccionado o cuando la fase no tiene una vista especializada.
      function hideItemsPanel() {
        workspace.classList.add('no-items');
        itemsTitle.textContent = 'Items de la ejecución';
        itemsSummary.textContent = '';
        itemsHeader.innerHTML = delayHeader();
        itemsBody.innerHTML = '<tr><td colspan="6">Selecciona una ejecución de Fase 01 o Fase 02</td></tr>';
      }

      // Fase 01 y Fase 02 comparten la misma vista de tabla de vuelos.
      function isDelayPhase(result) {
        return result && (result.phaseCode === 'PHASE_01' || result.phaseCode === 'PHASE_02');
      }

      // Fase 04 se pinta como histograma visual.
      function isHistogramPhase(result) {
        return result && result.phaseCode === 'PHASE_04';
      }

      // Renderiza items `delay_match` como una fila por vuelo. Fase 01 no suele
      // traer matricula, mientras que Fase 02 si rellena `tailNum`.
      function renderDelayItems(result, items, itemsShown, itemsTotal) {
        workspace.classList.remove('no-items');
        itemsTitle.textContent = 'Items de la ejecución';
        itemsSummary.textContent = `${result.phaseName}: mostrando ${itemsShown} de ${itemsTotal} items`;
        itemsHeader.innerHTML = delayHeader();
        if (items.length === 0) {
          itemsBody.innerHTML = '<tr><td colspan="6">No hay items para esta ejecución</td></tr>';
          return;
        }
        itemsBody.innerHTML = items.map((item) => `
          <tr>
            <td>${html(item.itemIndex)}</td>
            <td>${html(item.flightId)}</td>
            <td>${html(item.tailNum)}</td>
            <td>${html(item.delayKind)}</td>
            <td>${html(item.delayMinutes)}</td>
            <td>${html(item.rawText)}</td>
          </tr>
        `).join('');
      }

      // Busca el mayor contador de aeropuertos entre los items cargados. Ese
      // valor sera la barra al 100%; el resto se escala proporcionalmente.
      function maximumAirportCount(items) {
        return items.reduce((maximum, item) => {
          const count = numberValue(item.airportCount);
          return count > maximum ? count : maximum;
        }, 0);
      }

      // Renderiza items `airport_histogram` como tabla con barra horizontal.
      // Solo se representan los items que ha devuelto la API segun `itemLimit`.
      function renderHistogramItems(result, items, itemsShown, itemsTotal) {
        workspace.classList.remove('no-items');
        itemsTitle.textContent = 'Histograma de aeropuertos';
        itemsSummary.textContent = `${result.phaseName}: mostrando ${itemsShown} de ${itemsTotal} aeropuertos`;
        itemsHeader.innerHTML = histogramHeader();
        if (items.length === 0) {
          itemsBody.innerHTML = '<tr><td colspan="4">No hay aeropuertos para esta ejecución</td></tr>';
          return;
        }

        const maximumCount = maximumAirportCount(items);
        itemsBody.innerHTML = items.map((item) => {
          const count = numberValue(item.airportCount);
          // La barra minima visible es 1% si el aeropuerto tiene conteo positivo.
          // Asi los aeropuertos pequenos no desaparecen visualmente.
          const width = maximumCount > 0 && count > 0 ? Math.max(count * 100 / maximumCount, 1).toFixed(2) : '0';
          const title = item.rawText || item.barText || `${text(item.airportCode)} ${count}`;
          return `
            <tr>
              <td>${html(item.airportCode)}</td>
              <td>${html(item.airportSeqId)}</td>
              <td class="histogram-count">${html(item.airportCount)}</td>
              <td>
                <div class="histogram-bar" title="${html(title)}">
                  <span class="histogram-fill" style="width: ${width}%"></span>
                </div>
              </td>
            </tr>
          `;
        }).join('');
      }

      // Resalta en la tabla principal el run cuyo detalle se esta visualizando.
      function markSelectedRow(id) {
        resultsBody.querySelectorAll('tr[data-id]').forEach((row) => {
          row.classList.toggle('selected', row.dataset.id === String(id));
        });
      }

      // Carga la tabla principal de ejecuciones aplicando filtros de usuario,
      // fase y limite. Al refrescar se limpia cualquier detalle anterior.
      async function loadResults() {
        clearError();
        detailPanel.classList.add('hidden');
        hideItemsPanel();
        selectedResultId = null;
        const params = new URLSearchParams({
          limit: document.getElementById('resultsLimit').value
        });
        const user = document.getElementById('userFilter').value.trim();
        const phase = document.getElementById('phaseFilter').value;
        if (user) params.set('user', user);
        if (phase) params.set('phase', phase);

        try {
          const response = await fetch(`/api/results?${params.toString()}`);
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error || 'No se pudieron cargar los resultados');
          }
          renderRows(payload.results || []);
        } catch (error) {
          resultsBody.innerHTML = '<tr><td colspan="5">Sin datos disponibles</td></tr>';
          showError(error.message);
        }
      }

      // Pinta las filas resumidas de `phase_runs` que devuelve GET /api/results.
      function renderRows(rows) {
        if (rows.length === 0) {
          resultsBody.innerHTML = '<tr><td colspan="5">No hay resultados</td></tr>';
          return;
        }
        resultsBody.innerHTML = rows.map((row) => `
          <tr data-id="${html(row.id)}">
            <td>${html(formatDate(row.executedAt))}</td>
            <td>${html(row.userName)}</td>
            <td>${html(row.phaseName)}</td>
            <td>${html(row.resultSummary)}</td>
            <td>${html(row.itemCount)}</td>
          </tr>
        `).join('');
      }

      // Carga el detalle de un run concreto. La API devuelve la cabecera del run,
      // los primeros N items y el total real para mostrar informacion de truncado.
      async function loadDetail(id) {
        clearError();
        selectedResultId = id;
        const itemLimit = document.getElementById('detailLimit').value;
        try {
          const response = await fetch(`/api/results/${id}?itemLimit=${encodeURIComponent(itemLimit)}`);
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error || 'No se pudo cargar el detalle');
          }
          const result = payload.result;
          const items = payload.items || [];
          const itemsShown = payload.itemsShown === undefined ? items.length : payload.itemsShown;
          const itemsTotal = payload.itemsTotal === undefined ? result.itemCount : payload.itemsTotal;
          detailTitle.textContent = `${result.phaseName} - ${result.userName}`;
          detailMeta.innerHTML = `
            <p><strong>Fecha:</strong> ${html(formatDate(result.executedAt))}</p>
            <p><strong>Resumen:</strong> ${html(result.resultSummary)}</p>
            <p><strong>Dataset:</strong> ${html(result.datasetPath)}</p>
            <p><strong>Items mostrados:</strong> ${html(itemsShown)} de ${html(itemsTotal)}</p>
          `;
          detailItems.textContent = JSON.stringify(items, null, 2);
          detailPanel.classList.remove('hidden');
          markSelectedRow(id);

          // La misma respuesta de detalle alimenta tres vistas:
          // tabla de retrasos, histograma o solo JSON para reducciones.
          if (isDelayPhase(result)) {
            renderDelayItems(result, items, itemsShown, itemsTotal);
          } else if (isHistogramPhase(result)) {
            renderHistogramItems(result, items, itemsShown, itemsTotal);
          } else {
            hideItemsPanel();
          }
        } catch (error) {
          showError(error.message);
        }
      }

      // Eventos de interfaz: refresco manual, cambios de limite y seleccion de
      // una fila de la tabla principal.
      document.getElementById('refreshButton').addEventListener('click', loadResults);
      document.getElementById('resultsLimit').addEventListener('change', loadResults);
      document.getElementById('detailLimit').addEventListener('change', () => {
        if (selectedResultId) {
          loadDetail(selectedResultId);
        }
      });
      resultsBody.addEventListener('click', (event) => {
        const row = event.target.closest('tr[data-id]');
        if (row) {
          loadDetail(row.dataset.id);
        }
      });

      // Carga inicial al abrir la pagina.
      loadResults();
    </script>
  </body>
</html>
